name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: driverslicense-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy AWS stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification harnesses
        run: npm run verify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Bootstrap CDK
        run: npm run bootstrap --workspace @driverslicense/cdk

      - name: Deploy CDK stack
        run: npm run deploy --workspace @driverslicense/cdk -- --require-approval never
